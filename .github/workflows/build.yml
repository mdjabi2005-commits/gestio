name: ðŸš€ Build, Sign & Release Gestio

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write   # Requis pour l'authentification OIDC Azure (sans secret long-terme)

# â”€â”€ Variables globales â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
env:
  PYTHON_VERSION: "3.12"
  APP_NAME: "GestioV4"
  # Azure Key Vault â€” valeurs injectÃ©es depuis GitHub Secrets
  # (configurÃ©es via : Settings â†’ Secrets â†’ Actions)
  AZURE_VAULT_URI:      ${{ secrets.AZURE_VAULT_URI }}       # https://gestio-kv.vault.azure.net/
  AZURE_CLIENT_ID:      ${{ secrets.AZURE_CLIENT_ID }}       # App Registration client ID
  AZURE_TENANT_ID:      ${{ secrets.AZURE_TENANT_ID }}       # Azure Tenant ID
  AZURE_CLIENT_SECRET:  ${{ secrets.AZURE_CLIENT_SECRET }}   # App Registration secret
  CERT_NAME:            gestio-codesign                       # Nom du certificat dans Key Vault
  TIMESTAMP_URL:        http://timestamp.digicert.com         # Serveur de timestamp RFC 3161

jobs:

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  # BUILD MULTI-PLATEFORME â€” strategy: matrix
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  build:
    name: ðŸ”¨ Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact: GestioV4-Windows
          - os: macos-latest
            name: macOS
            artifact: GestioV4-macOS
          - os: ubuntu-22.04
            name: Linux
            artifact: GestioV4-Linux

    steps:
      - name: ðŸ“¥ Checkout
        uses: actions/checkout@v4

      - name: ðŸ Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: ðŸ“¦ Setup uv
        uses: astral-sh/setup-uv@v5

      - name: ðŸ“¦ DÃ©pendances systÃ¨me Linux
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgl1 libglib2.0-0 libfuse2 patchelf \
            desktop-file-utils \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0

      - name: ðŸ“¦ Installer les dÃ©pendances (uv sync --frozen)
        run: uv sync --frozen --no-dev

      - name: ðŸ“¦ Installer PyInstaller
        run: uv pip install pyinstaller

      - name: ðŸŽ¨ GÃ©nÃ©rer les icÃ´nes
        run: uv run python resources/icons/generate_icons.py

      - name: ðŸ”¨ PyInstaller â€” build onedir
        run: uv run pyinstaller gestio.spec --noconfirm

      # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
      # WINDOWS â€” Signature + Inno Setup
      # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
      - name: ðŸ” Installer AzureSignTool
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # AzureSignTool = outil CLI qui signe via Azure Key Vault sans tÃ©lÃ©charger le certificat
          dotnet tool install --global AzureSignTool

      - name: ðŸ” Signer GestioV4.exe
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          AzureSignTool sign `
            --azure-key-vault-url        "$env:AZURE_VAULT_URI" `
            --azure-key-vault-client-id  "$env:AZURE_CLIENT_ID" `
            --azure-key-vault-tenant-id  "$env:AZURE_TENANT_ID" `
            --azure-key-vault-client-secret "$env:AZURE_CLIENT_SECRET" `
            --azure-key-vault-certificate   "$env:CERT_NAME" `
            --timestamp-rfc3161          "$env:TIMESTAMP_URL" `
            --timestamp-digest           sha256 `
            --file-digest                sha256 `
            --description                "Gestio - Gestion Financiere Personnelle" `
            --description-url            "https://github.com/djabi/gestio" `
            "dist\GestioV4\GestioV4.exe"

      - name: ðŸ” Signer toutes les DLL du build
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # RÃ©cupÃ©rer toutes les DLL signables (exclure les DLL systÃ¨me Microsoft dÃ©jÃ  signÃ©es)
          $dlls = Get-ChildItem -Path "dist\GestioV4" -Recurse -Include "*.dll", "*.pyd" |
                  Where-Object { $_.Length -gt 0 } |
                  Select-Object -ExpandProperty FullName

          if ($dlls.Count -eq 0) {
            Write-Host "Aucune DLL trouvÃ©e."
            exit 0
          }

          Write-Host "ðŸ“‹ Signature de $($dlls.Count) fichiers..."

          # AzureSignTool accepte plusieurs fichiers en une seule invocation
          AzureSignTool sign `
            --azure-key-vault-url           "$env:AZURE_VAULT_URI" `
            --azure-key-vault-client-id     "$env:AZURE_CLIENT_ID" `
            --azure-key-vault-tenant-id     "$env:AZURE_TENANT_ID" `
            --azure-key-vault-client-secret "$env:AZURE_CLIENT_SECRET" `
            --azure-key-vault-certificate   "$env:CERT_NAME" `
            --timestamp-rfc3161             "$env:TIMESTAMP_URL" `
            --timestamp-digest              sha256 `
            --file-digest                   sha256 `
            --continue-on-error `
            @dlls

      - name: ðŸªŸ Inno Setup â€” crÃ©er l'installeur
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $url = "https://jrsoftware.org/download.php/is.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\innosetup.exe"
          Start-Process -FilePath "$env:TEMP\innosetup.exe" -ArgumentList "/VERYSILENT /NORESTART" -Wait
          New-Item -ItemType Directory -Force -Path "dist\installer" | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" gestio.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: ðŸ” Signer l'installeur Inno Setup
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $installer = Get-ChildItem "dist\installer\Gestio-Setup-*.exe" | Select-Object -First 1
          AzureSignTool sign `
            --azure-key-vault-url           "$env:AZURE_VAULT_URI" `
            --azure-key-vault-client-id     "$env:AZURE_CLIENT_ID" `
            --azure-key-vault-tenant-id     "$env:AZURE_TENANT_ID" `
            --azure-key-vault-client-secret "$env:AZURE_CLIENT_SECRET" `
            --azure-key-vault-certificate   "$env:CERT_NAME" `
            --timestamp-rfc3161             "$env:TIMESTAMP_URL" `
            --timestamp-digest              sha256 `
            --file-digest                   sha256 `
            --description                   "Gestio Installer" `
            "$($installer.FullName)"

      - name: ðŸ“¤ Upload artifact Windows
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/installer/Gestio-Setup-*.exe
          if-no-files-found: error

      # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
      # MACOS â€” .dmg
      # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
      - name: ðŸŽ CrÃ©er le .dmg macOS
        if: matrix.os == 'macos-latest'
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Gestio V4" \
            --volicon "resources/icons/gestio.icns" \
            --window-pos 200 120 --window-size 600 400 \
            --icon-size 100 \
            --icon "Gestio.app" 175 190 \
            --hide-extension "Gestio.app" \
            --app-drop-link 425 190 \
            --no-internet-enable \
            "dist/Gestio-macOS.dmg" \
            "dist/Gestio.app"

      - name: ðŸ“¤ Upload artifact macOS
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/Gestio-macOS.dmg
          if-no-files-found: error

      # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
      # LINUX â€” AppImage
      # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
      - name: ðŸ§ CrÃ©er l'AppImage Linux
        if: matrix.os == 'ubuntu-22.04'
        run: |
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" \
               -O /tmp/appimagetool
          chmod +x /tmp/appimagetool

          APPDIR="dist/GestioV4.AppDir"
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/share/icons/hicolor/512x512/apps"
          cp -r dist/GestioV4/* "$APPDIR/usr/bin/"
          cp resources/icons/gestio.png "$APPDIR/usr/share/icons/hicolor/512x512/apps/gestio.png"
          cp resources/icons/gestio.png "$APPDIR/gestio.png"

          cat > "$APPDIR/gestio.desktop" << 'EOF'
          [Desktop Entry]
          Name=Gestio
          Comment=Gestion FinanciÃ¨re Personnelle
          Exec=GestioV4
          Icon=gestio
          Type=Application
          Categories=Finance;Office;
          Terminal=false
          EOF

          cat > "$APPDIR/AppRun" << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=$(dirname "$SELF")
          exec "$HERE/usr/bin/GestioV4" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          ARCH=x86_64 /tmp/appimagetool "$APPDIR" "dist/Gestio-Linux.AppImage"

      - name: ðŸ“¤ Upload artifact Linux
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/Gestio-Linux.AppImage
          if-no-files-found: error

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  # RELEASE
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  release:
    name: ðŸ“¦ CrÃ©er la Release GitHub
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: ðŸ“¥ TÃ©lÃ©charger tous les artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release
          merge-multiple: true

      - name: ðŸ“‹ Lister les fichiers
        run: ls -lh ./release/

      - name: ðŸš€ CrÃ©er la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "ðŸ’° Gestio ${{ github.ref_name }}"
          body: |
            ## ðŸ’° Gestio ${{ github.ref_name }}

            ### ðŸ“¥ TÃ©lÃ©chargements â€” aucune installation de Python requise

            | Plateforme | Fichier | Instructions |
            |---|---|---|
            | ðŸªŸ **Windows** | `Gestio-Setup-v*.exe` | Double-clic â†’ assistant d'installation |
            | ðŸŽ **macOS** | `Gestio-macOS.dmg` | Ouvrir â†’ glisser dans Applications |
            | ðŸ§ **Linux** | `Gestio-Linux.AppImage` | `chmod +x Gestio-Linux.AppImage && ./Gestio-Linux.AppImage` |

            ### ðŸ”’ ConfidentialitÃ©
            > Vos donnÃ©es financiÃ¨res sont stockÃ©es **uniquement sur votre machine**.
            > Aucune donnÃ©e n'est transmise sur internet.

            ### âœ… Signature numÃ©rique
            > Le binaire Windows est signÃ© numÃ©riquement via Azure Key Vault.
            > SmartScreen et les antivirus reconnaissent l'Ã©diteur **Djabi**.

            ### âš™ï¸ Configuration minimale
            - Windows 10 / macOS 11 / Ubuntu 20.04+
            - 4 GB RAM (8 GB recommandÃ© pour l'OCR)
            - 500 MB d'espace disque
          files: |
            ./release/Gestio-Setup-*.exe
            ./release/Gestio-macOS.dmg
            ./release/Gestio-Linux.AppImage
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
