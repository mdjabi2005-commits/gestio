name: Build Release

on:
  push:
    branches:
      - main
    paths:
      - '**.py'           # Se déclenche uniquement si un fichier .py est modifié
  workflow_dispatch:      # Lancement manuel depuis GitHub Actions

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install streamlit pandas altair plotly numpy matplotlib pillow opencv-python pdfminer.six rapidocr-onnxruntime psutil pydantic requests pyjwt cryptography pyyaml python-dateutil

      - name: Build executable
        run: pyinstaller gestio.spec

      - name: Generate tag name
        id: tag
        run: |
          $date = Get-Date -Format "yyyy.MM.dd"
          $sha = "${{ github.sha }}".Substring(0, 7)
          $tag = "v$date-$sha"
          echo "TAG_NAME=$tag" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: "Release ${{ steps.tag.outputs.TAG_NAME }}"
          files: dist/GestioV4.exe
          draft: true
