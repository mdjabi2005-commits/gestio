name: Build Sign and Release Gestio

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.6.6"
  APP_NAME: "Gestio"
  AZURE_VAULT_URI: ${{ secrets.AZURE_VAULT_URI }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  CERT_NAME: gestio-codesign
  TIMESTAMP_URL: http://timestamp.digicert.com

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact: Gestio-Windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}


      # prepare_dist.py utilise stdlib pure (shutil/pathlib) — pas besoin de venv
      - name: Prepare sources
        run: python scripts/prepare_dist.py

      # ── 2. Compiler le mini-launcher Tkinter (~5-10 Mo) ────────────────────
      # pip install dans le Python du runner — AUCUN venv projet cree,
      # AUCUNE dependance app (streamlit/pandas/onnxruntime) telechargee
      - name: Build mini-launcher (PyInstaller)
        if: matrix.os == 'windows-latest'
        run: |
          pip install --quiet pyinstaller
          pyinstaller launcher/gestio-launcher.spec --noconfirm
          # L'EXE est dans dist/GestioLauncher.exe (mode onefile)

      # ── 3. Telecharger uv standalone pour embarquer dans l'installeur ──────
      - name: Download uv standalone
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist\uv" | Out-Null
          $uvUrl = "https://github.com/astral-sh/uv/releases/download/${{ env.UV_VERSION }}/uv-x86_64-pc-windows-msvc.zip"
          Write-Host "Telechargement de uv ${{ env.UV_VERSION }}..."
          Invoke-WebRequest -Uri $uvUrl -OutFile "dist\uv\uv.zip"
          Expand-Archive -Path "dist\uv\uv.zip" -DestinationPath "dist\uv\temp" -Force
          # Le zip contient un dossier, trouver uv.exe dedans
          $uvExe = Get-ChildItem -Path "dist\uv\temp" -Recurse -Filter "uv.exe" | Select-Object -First 1
          if (-not $uvExe) { Write-Error "uv.exe introuvable dans le zip"; exit 1 }
          Move-Item $uvExe.FullName "dist\uv\uv.exe" -Force
          Remove-Item "dist\uv\temp" -Recurse -Force
          Remove-Item "dist\uv\uv.zip" -Force
          Write-Host "OK - dist\uv\uv.exe pret"

      # ── 4. Signature Azure ─────────────────────────────────────────────────
      # Inno Setup d'abord — on signe launcher + installeur en une seule passe
      - name: Generate and build Inno Setup installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # generate_iss.py utilise stdlib pure — python direct sans uv run
          python scripts/generate_iss.py
          $bytes = [System.IO.File]::ReadAllBytes("gestio.iss")
          $bad = $bytes | Where-Object { $_ -gt 127 }
          if ($bad.Count -gt 0) { Write-Error "gestio.iss non-ASCII !"; exit 1 }
          Write-Host "gestio.iss OK - $($bytes.Count) octets, 100% ASCII"

          # Inno Setup est pre-installe sur windows-latest
          New-Item -ItemType Directory -Force -Path "dist\installer" | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" gestio.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # Signature Azure — skip si secrets absents (branches de test)
      - name: Sign executables (Azure Code Signing)
        if: |
          matrix.os == 'windows-latest' &&
          env.AZURE_VAULT_URI != '' &&
          env.AZURE_CLIENT_ID != '' &&
          env.AZURE_TENANT_ID != '' &&
          env.AZURE_CLIENT_SECRET != ''
        shell: pwsh
        run: |
          dotnet tool install --global AzureSignTool --version 5.0.0
          $installer = Get-ChildItem "dist\installer\Gestio-Setup-*.exe" | Select-Object -First 1
          if (-not $installer) { Write-Error "Installeur introuvable"; exit 1 }

          # Signer launcher + installeur en une seule commande
          AzureSignTool sign `
            --azure-key-vault-url        "$env:AZURE_VAULT_URI" `
            --azure-key-vault-client-id  "$env:AZURE_CLIENT_ID" `
            --azure-key-vault-tenant-id  "$env:AZURE_TENANT_ID" `
            --azure-key-vault-client-secret "$env:AZURE_CLIENT_SECRET" `
            --azure-key-vault-certificate "$env:CERT_NAME" `
            --timestamp-rfc3161 "$env:TIMESTAMP_URL" `
            --timestamp-digest sha256 `
            --file-digest sha256 `
            --description "Gestio" `
            --description-url "https://github.com/mdjabi2005-commits/gestio" `
            "dist\GestioLauncher.exe" `
            "$($installer.FullName)"

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/installer/Gestio-Setup-*.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Gestio-Windows
          path: ./release

      - name: Prepare Mac/Linux script
        run: |
          chmod +x install-mac-linux.sh
          cp install-mac-linux.sh ./release/install-mac-linux.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Gestio ${{ github.ref_name }}"
          body: |
            ## Gestio ${{ github.ref_name }}

            ### Nouveaute : installation legere (plus de PyInstaller)
            L'installeur Windows ne fait plus que ~15 Mo.
            Au premier lancement, les dependances Python sont telechargees automatiquement via uv.

            | Platform | File | Instructions |
            |---|---|---|
            | Windows | `Gestio-Setup-v*.exe` | Double-click, assistant d'installation |
            | macOS / Linux | `install-mac-linux.sh` | `chmod +x install-mac-linux.sh && ./install-mac-linux.sh` |

            Vos donnees financieres restent 100% sur votre machine.
          files: |
            ./release/Gestio-Setup-*.exe
            ./release/install-mac-linux.sh
          fail_on_unmatched_files: true
          draft: true
          prerelease: false
