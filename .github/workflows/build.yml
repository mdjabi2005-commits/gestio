name: Build Sign and Release Gestio

on:
  push:
    branches:
      - main          # Build automatique a chaque push sur main (sans release)
    tags:
      - "v*.*.*"      # Build + Release sur les tags versionnés
  workflow_dispatch:  # Lancement manuel depuis l'onglet Actions sur GitHub

permissions:
  contents: write
  id-token: write

env:
  PYTHON_VERSION: "3.12"
  APP_NAME: "GestioV4"
  AZURE_VAULT_URI: ${{ secrets.AZURE_VAULT_URI }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  CERT_NAME: gestio-codesign
  TIMESTAMP_URL: http://timestamp.digicert.com

jobs:

  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact: GestioV4-Windows
          - os: macos-latest
            name: macOS
            artifact: GestioV4-macOS
          - os: ubuntu-22.04
            name: Linux
            artifact: GestioV4-Linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: System dependencies Linux
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgl1 libglib2.0-0 libfuse2 patchelf desktop-file-utils libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0

      - name: Install dependencies
        run: uv sync --frozen --no-dev --group build

      - name: Generate icons
        run: uv run python resources/icons/generate_icons.py

      - name: PyInstaller build
        run: uv run pyinstaller gestio.spec --noconfirm

      - name: Install AzureSignTool
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: dotnet tool install --global AzureSignTool

      - name: Sign GestioV4.exe
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          AzureSignTool sign `
            --azure-key-vault-url "$env:AZURE_VAULT_URI" `
            --azure-key-vault-client-id "$env:AZURE_CLIENT_ID" `
            --azure-key-vault-tenant-id "$env:AZURE_TENANT_ID" `
            --azure-key-vault-client-secret "$env:AZURE_CLIENT_SECRET" `
            --azure-key-vault-certificate "$env:CERT_NAME" `
            --timestamp-rfc3161 "$env:TIMESTAMP_URL" `
            --timestamp-digest sha256 `
            --file-digest sha256 `
            --description "Gestio - Gestion Financiere Personnelle" `
            --description-url "https://github.com/djabi/gestio" `
            "dist\GestioV4\GestioV4.exe"

      - name: Sign DLLs
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $dlls = Get-ChildItem -Path "dist\GestioV4" -Recurse -Include "*.dll","*.pyd" | Where-Object { $_.Length -gt 0 } | Select-Object -ExpandProperty FullName
          if ($dlls.Count -eq 0) { Write-Host "No DLLs found."; exit 0 }
          AzureSignTool sign `
            --azure-key-vault-url "$env:AZURE_VAULT_URI" `
            --azure-key-vault-client-id "$env:AZURE_CLIENT_ID" `
            --azure-key-vault-tenant-id "$env:AZURE_TENANT_ID" `
            --azure-key-vault-client-secret "$env:AZURE_CLIENT_SECRET" `
            --azure-key-vault-certificate "$env:CERT_NAME" `
            --timestamp-rfc3161 "$env:TIMESTAMP_URL" `
            --timestamp-digest sha256 `
            --file-digest sha256 `
            --continue-on-error `
            @dlls

      - name: Inno Setup installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile "$env:TEMP\innosetup.exe"
          Start-Process -FilePath "$env:TEMP\innosetup.exe" -ArgumentList "/VERYSILENT /NORESTART" -Wait
          New-Item -ItemType Directory -Force -Path "dist\installer" | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" gestio.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Sign installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $installer = Get-ChildItem "dist\installer\Gestio-Setup-*.exe" | Select-Object -First 1
          AzureSignTool sign `
            --azure-key-vault-url "$env:AZURE_VAULT_URI" `
            --azure-key-vault-client-id "$env:AZURE_CLIENT_ID" `
            --azure-key-vault-tenant-id "$env:AZURE_TENANT_ID" `
            --azure-key-vault-client-secret "$env:AZURE_CLIENT_SECRET" `
            --azure-key-vault-certificate "$env:CERT_NAME" `
            --timestamp-rfc3161 "$env:TIMESTAMP_URL" `
            --timestamp-digest sha256 `
            --file-digest sha256 `
            --description "Gestio Installer" `
            "$($installer.FullName)"

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/installer/Gestio-Setup-*.exe
          if-no-files-found: error

      - name: Create macOS dmg
        if: matrix.os == 'macos-latest'
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Gestio V4" \
            --volicon "resources/icons/gestio.icns" \
            --window-pos 200 120 --window-size 600 400 \
            --icon-size 100 \
            --icon "Gestio.app" 175 190 \
            --hide-extension "Gestio.app" \
            --app-drop-link 425 190 \
            --no-internet-enable \
            "dist/Gestio-macOS.dmg" \
            "dist/Gestio.app"

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/Gestio-macOS.dmg
          if-no-files-found: error

      - name: Create Linux AppImage
        if: matrix.os == 'ubuntu-22.04'
        run: |
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          APPDIR="dist/GestioV4.AppDir"
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/share/icons/hicolor/512x512/apps"
          cp -r dist/GestioV4/* "$APPDIR/usr/bin/"
          cp resources/icons/gestio.png "$APPDIR/usr/share/icons/hicolor/512x512/apps/gestio.png"
          cp resources/icons/gestio.png "$APPDIR/gestio.png"
          printf '[Desktop Entry]\nName=Gestio\nExec=GestioV4\nIcon=gestio\nType=Application\nCategories=Finance;Office;\nTerminal=false\n' > "$APPDIR/gestio.desktop"
          printf '#!/bin/bash\nSELF=$(readlink -f "$0")\nHERE=$(dirname "$SELF")\nexec "$HERE/usr/bin/GestioV4" "$@"\n' > "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"
          ARCH=x86_64 /tmp/appimagetool "$APPDIR" "dist/Gestio-Linux.AppImage"

      - name: Upload Linux artifact
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/Gestio-Linux.AppImage
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release
          merge-multiple: true

      - name: List files
        run: ls -lh ./release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Gestio ${{ github.ref_name }}"
          body: |
            ## Gestio ${{ github.ref_name }}

            | Platform | File | Instructions |
            |---|---|---|
            | Windows | Gestio-Setup-v*.exe | Double-click installer |
            | macOS | Gestio-macOS.dmg | Open and drag to Applications |
            | Linux | Gestio-Linux.AppImage | chmod +x then run |

            Your financial data is stored only on your machine.
          files: |
            ./release/Gestio-Setup-*.exe
            ./release/Gestio-macOS.dmg
            ./release/Gestio-Linux.AppImage
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
