name: Update Website on Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-site:
    name: Update Download Links
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          repository: mdjabi2005-commits/site-web-gestio
          token: ${{ secrets.GITHUB_TOKEN }}
          path: site-web

      - name: Checkout current repo (for scripts)
        uses: actions/checkout@v4
        with:
          path: gestio-repo

      - name: Update download links
        run: |
          python gestio-repo/.github/scripts/update_download.py "${{ github.event.release.tag_name }}"

      - name: Commit and push changes
        working-directory: site-web
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update download links for ${{ github.event.release.tag_name }}"
          git push
